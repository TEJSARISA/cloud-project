apiVersion: apps/v1
kind: Deployment
metadata:
  name: advanced-cloud-api
  labels:
    app: advanced-cloud-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: advanced-cloud-api
  template:
    metadata:
      labels:
        app: advanced-cloud-api
    spec:
      containers:
        - name: api
          image: advanced-cloud-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: prod
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
