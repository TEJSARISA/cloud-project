apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: advanced-cloud-api
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.example.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: advanced-cloud-api
                port:
                  number: 80
